# ~/.config/swarm/.agents-conf.yaml
# Swarm-Orchest-IA — Configuración centralizada de modelos
# Proveedor por defecto: opencode-go (OpenCode Go subscription)
#
# Este archivo es la ÚNICA fuente de verdad para modelos y temperaturas.
# Los agentes en templates/ NO contienen model: hardcodeado.
# `swarm init` inyecta model: y temperature: desde este archivo.
#
# Para override por proyecto, crear .swarm/.agents-conf.yaml en el proyecto
# con solo las claves que quieras sobreescribir. El resto se hereda del global.

swarm-orchestrator:
  primary: opencode-go/deepseek-v4-pro
  fallback: opencode-go/kimi-k2.6
  temperature: 0.3

swarm-explorer:
  primary: opencode-go/deepseek-v4-flash
  fallback: opencode-go/minimax-m2.7
  temperature: 0.1

swarm-specifier:
  primary: opencode-go/glm-5
  fallback: opencode-go/deepseek-v4-pro
  temperature: 0.2

swarm-designer:
  primary: opencode-go/glm-5.1
  fallback: opencode-go/glm-5
  temperature: 0.3

swarm-implementer:
  primary: opencode-go/deepseek-v4-pro
  fallback: opencode-go/kimi-k2.6
  temperature: 0.2

swarm-verifier:
  primary: opencode-go/glm-5
  fallback: opencode-go/deepseek-v4-pro
  temperature: 0.1